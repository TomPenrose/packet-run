// Game constants

const GAME_H = 450;
const TILE = 32;
const GRAVITY = 0.6;
const JUMP_FORCE = -11;
const MOVE_SPEED = 4;
const GAME_DURATION = 65; // seconds
const LEVEL_WIDTH = TILE * 200; // total level width in pixels

let scale = 1;
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  scale = Math.min(w / GAME_W, h / GAME_H);
  canvas.width = GAME_W;
  canvas.height = GAME_H;
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// PIXEL ART DRAWING HELPERS
// ============================================================
function drawPixelArt(data, x, y, pixelSize) {
  for (let row = 0; row < data.length; row++) {
    for (let col = 0; col < data[row].length; col++) {
      const color = data[row][col];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(
          Math.floor(x + col * pixelSize),
          Math.floor(y + row * pixelSize),
          pixelSize, pixelSize
        );
      }
    }
  }
}

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playTone(freq, duration, type = 'square', volume = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxJump() { playTone(400, 0.1, 'square', 0.06); setTimeout(() => playTone(600, 0.1, 'square', 0.05), 50); }
function sfxCollect() { playTone(800, 0.08, 'square', 0.06); setTimeout(() => playTone(1200, 0.12, 'square', 0.05), 60); }
function sfxHit() { playTone(150, 0.2, 'sawtooth', 0.08); }
function sfxStomp() { playTone(300, 0.1, 'square', 0.06); setTimeout(() => playTone(500, 0.15, 'square', 0.05), 80); }

function sfxVictory() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.3, 'square', 0.07), i * 150));
}

// Simple music loop
let musicInterval = null;
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  const melody = [
    262, 330, 392, 523, 392, 330, 262, 294,
    330, 392, 523, 659, 523, 392, 330, 294,
    349, 440, 523, 659, 523, 440, 349, 294,
    262, 330, 392, 523, 659, 523, 392, 262
  ];
  let idx = 0;
  musicInterval = setInterval(() => {
    if (!musicPlaying) { clearInterval(musicInterval); return; }
    playTone(melody[idx % melody.length], 0.15, 'square', 0.03);
    playTone(melody[idx % melody.length] / 2, 0.15, 'triangle', 0.02);
    idx++;
  }, 180);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) clearInterval(musicInterval);
}

// Input

  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
let touchLeft = false, touchRight = false, touchJump = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.touches) {
    const rect = canvas.getBoundingClientRect();
    const tx = (t.clientX - rect.left) / scale;
    const ty = (t.clientY - rect.top) / scale;
    if (ty > GAME_H * 0.6) {
      if (tx < GAME_W / 3) touchLeft = true;
      else if (tx > GAME_W * 2/3) touchRight = true;
    } else {
      touchJump = true;
    }
  }
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchLeft = false; touchRight = false; touchJump = false;
});

// LEVEL GENERATION
// ============================================================
let platforms = [];
let enemies = [];
let packets = [];
let finishX = 0;

function generateLevel() {
  platforms = [];
  enemies = [];
  packets = [];
  
  // Ground platform
  for (let x = 0; x < 12; x++) {
    platforms.push({ x: x * TILE, y: GAME_H - TILE, w: TILE, h: TILE, type: 'ground' });
  }
  
  let px = 12 * TILE;
  const sections = [];
  
  // Section 1: Tutorial (0-10s zone, ~600px)
  // Simple platforms with packets
  for (let i = 0; i < 5; i++) {
    const gapW = 48 + Math.random() * 32;
    platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 3, h: TILE, type: 'ground' });
    // Packets above platforms
    packets.push({ x: px + TILE, y: GAME_H - TILE * 3, collected: false });
    packets.push({ x: px + TILE * 2, y: GAME_H - TILE * 3, collected: false });
    px += TILE * 3 + gapW;
  }
  
  // Elevated platforms
  platforms.push({ x: px, y: GAME_H - TILE * 3, w: TILE * 4, h: TILE, type: 'platform' });
  packets.push({ x: px + TILE, y: GAME_H - TILE * 5, collected: false });
  packets.push({ x: px + TILE * 2, y: GAME_H - TILE * 5, collected: false });
  px += TILE * 5;
  
  platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 6, h: TILE, type: 'ground' });
  px += TILE * 3;
  
  // Section 2: First enemies (10-25s, ~900px)
  // Packet Loss enemies
  for (let i = 0; i < 3; i++) {
    platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 5, h: TILE, type: 'ground' });
    enemies.push({ x: px + TILE * 2, y: GAME_H - TILE * 2, type: 'packetloss', 
      baseX: px + TILE * 2, phase: Math.random() * Math.PI * 2, alive: true });
    packets.push({ x: px + TILE * 4, y: GAME_H - TILE * 3, collected: false });
    px += TILE * 5 + 60;
    
    // Floating platform
    platforms.push({ x: px - 30, y: GAME_H - TILE * 3, w: TILE * 3, h: TILE, type: 'platform' });
    packets.push({ x: px, y: GAME_H - TILE * 5, collected: false });
  }
  
  platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 4, h: TILE, type: 'ground' });
  px += TILE * 5;
  
  // Moving platforms section
  for (let i = 0; i < 2; i++) {
    platforms.push({ x: px, y: GAME_H - TILE * 2.5, w: TILE * 2, h: TILE / 2, type: 'moving',
      baseX: px, moveRange: TILE * 2, moveSpeed: 0.02, phase: i * Math.PI });
    packets.push({ x: px + TILE, y: GAME_H - TILE * 4.5, collected: false });
    px += TILE * 5;
  }
  
  platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 6, h: TILE, type: 'ground' });
  px += TILE * 3;
  
  // Section 3: Latency + more (25-40s, ~1000px)
  for (let i = 0; i < 2; i++) {
    platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 6, h: TILE, type: 'ground' });
    enemies.push({ x: px + TILE * 3, y: GAME_H - TILE * 2, type: 'latency',
      baseX: px + TILE, patrolRange: TILE * 4, dir: 1, alive: true });
    packets.push({ x: px + TILE, y: GAME_H - TILE * 3, collected: false });
    packets.push({ x: px + TILE * 4, y: GAME_H - TILE * 3, collected: false });
    px += TILE * 7;
  }
  
  // Staircase platforms
  for (let i = 0; i < 4; i++) {
    platforms.push({ x: px + i * TILE * 2, y: GAME_H - TILE * (2 + i), w: TILE * 2, h: TILE, type: 'platform' });
    packets.push({ x: px + i * TILE * 2 + TILE / 2, y: GAME_H - TILE * (4 + i), collected: false });
  }
  px += TILE * 10;
  
  // Lag spikes section
  platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 12, h: TILE, type: 'ground' });
  for (let i = 0; i < 3; i++) {
    enemies.push({ x: px + TILE * 2 + i * TILE * 3, y: GAME_H - TILE, type: 'lagspike',
      timer: Math.random() * 3, active: false, warningTimer: 0, alive: true });
  }
  packets.push({ x: px + TILE * 5, y: GAME_H - TILE * 4, collected: false });
  packets.push({ x: px + TILE * 8, y: GAME_H - TILE * 4, collected: false });
  px += TILE * 13;
  
  // Section 4: Server enemies + final challenge (40-55s)
  for (let i = 0; i < 3; i++) {
    platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 5, h: TILE, type: 'ground' });
    if (i < 2) {
      enemies.push({ x: px + TILE * 2, y: GAME_H - TILE * 2.5, type: 'server',
        baseX: px + TILE, patrolRange: TILE * 3, dir: 1, alive: true });
    }
    packets.push({ x: px + TILE * 2, y: GAME_H - TILE * 4, collected: false });
    px += TILE * 6;
    
    // Gap with floating platform
    platforms.push({ x: px - TILE, y: GAME_H - TILE * 3, w: TILE * 2, h: TILE / 2, type: 'platform' });
    packets.push({ x: px - TILE / 2, y: GAME_H - TILE * 5, collected: false });
  }
  
  // Final climb - bridge tower section
  platforms.push({ x: px, y: GAME_H - TILE, w: TILE * 4, h: TILE, type: 'ground' });
  px += TILE * 2;
  for (let i = 0; i < 5; i++) {
    const side = i % 2 === 0 ? 0 : TILE * 2;
    platforms.push({ x: px + side, y: GAME_H - TILE * (2 + i * 1.5), w: TILE * 3, h: TILE / 2, type: 'platform' });
    packets.push({ x: px + side + TILE, y: GAME_H - TILE * (3.5 + i * 1.5), collected: false });
  }
  px += TILE * 6;
  
  // Section 5: Sprint finish (55-60s)
  platforms.push({ x: px, y: GAME_H - TILE * 2, w: TILE * 15, h: TILE, type: 'ground' });
  for (let i = 0; i < 8; i++) {
    packets.push({ x: px + TILE + i * TILE * 1.5, y: GAME_H - TILE * 4, collected: false });
  }
  px += TILE * 15;
  
  // Finish line
  finishX = px - TILE * 3;
  
  // Add ground fill
  const groundPlatforms = platforms.filter(p => p.type === 'ground');
  // We draw extra ground blocks below platforms in the render
}

// ============================================================
// PLAYER
// ============================================================
const player = {
  x: TILE * 2, y: GAME_H - TILE * 3,
  vx: 0, vy: 0,
  w: 28, h: 44,
  grounded: false,
  facing: 1,
  animFrame: 0,
  animTimer: 0,
  hitTimer: 0,
  lagTimer: 0, // latency effect
  jumpsLeft: 2,
  dead: false
};

function resetPlayer() {
  player.x = TILE * 2;
  player.y = GAME_H - TILE * 3;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;
  player.facing = 1;
  player.animFrame = 0;
  player.hitTimer = 0;
  player.lagTimer = 0;
  player.jumpsLeft = 2;
  player.dead = false;
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count = 5, speed = 3) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * speed * 2,
      vy: (Math.random() - 1) * speed,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// ============================================================
// COLLISION
// ============================================================
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  if (gameState === 'menu') {
    menuBlink += dt;
    // Start game
    if (keys['Space'] || keys['Enter'] || touchJump) {
      gameState = 'playing';
      gameTime = 0;
      score = 0;
      cameraX = 0;
      particles = [];
      generateLevel();
      resetPlayer();
      initAudio();
      startMusic();
      keys['Space'] = false;
      touchJump = false;
    }
    return;
  }
  
  if (gameState === 'victory') {
    menuBlink += dt;
    if (keys['Space'] || keys['Enter'] || touchJump) {
      gameState = 'menu';
      stopMusic();
      keys['Space'] = false;
      touchJump = false;
    }
    return;
  }
  
  // === GAMEPLAY ===
  gameTime += dt;
  
  // Update moving platforms
  platforms.forEach(p => {
    if (p.type === 'moving') {
      p.phase = (p.phase || 0) + p.moveSpeed;
      p.x = p.baseX + Math.sin(p.phase) * p.moveRange;
    }
  });
  
  // Player movement
  let moveX = 0;
  if (player.lagTimer > 0) {
    player.lagTimer -= dt;
    // Delayed/sluggish controls
    if (keys['ArrowRight'] || keys['KeyD'] || touchRight) moveX = 0.5;
    if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) moveX = -0.5;
  } else {
    if (keys['ArrowRight'] || keys['KeyD'] || touchRight) moveX = 1;
    if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) moveX = -1;
  }
  
  if (moveX !== 0) player.facing = moveX > 0 ? 1 : -1;
  
  player.vx = moveX * MOVE_SPEED;
  player.vy += GRAVITY;
  if (player.vy > 12) player.vy = 12;
  
  // Jump
  const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchJump;
  if (jumpPressed && player.jumpsLeft > 0 && !player._jumpHeld) {
    player.vy = JUMP_FORCE;
    player.jumpsLeft--;
    player.grounded = false;
    player._jumpHeld = true;
    sfxJump();
    spawnParticles(player.x + player.w / 2, player.y + player.h, '#fff', 3, 2);
  }
  if (!jumpPressed) player._jumpHeld = false;
  
  // Apply velocity
  player.x += player.vx;
  player.y += player.vy;
  
  // Platform collision
  player.grounded = false;
  platforms.forEach(p => {
    const platRect = { x: p.x, y: p.y, w: p.w, h: p.h };
    if (rectCollide(player, platRect)) {
      // Check if landing on top
      const prevBottom = player.y + player.h - player.vy;
      if (prevBottom <= p.y + 4 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumpsLeft = 2;
      }
      // Side collision
      else if (player.vy <= 0 || prevBottom > p.y + 4) {
        if (p.type === 'ground') {
          // Push out horizontally
          const overlapLeft = (player.x + player.w) - p.x;
          const overlapRight = (p.x + p.w) - player.x;
          if (overlapLeft < overlapRight) {
            player.x = p.x - player.w;
          } else {
            player.x = p.x + p.w;
          }
        }
      }
    }
  });
  
  // Fall off screen
  if (player.y > GAME_H + 50) {
    // Respawn on nearest platform
    player.vy = 0;
    player.y = GAME_H - TILE * 4;
    player.hitTimer = 1;
    screenShake = 0.3;
    sfxHit();
  }
  
  // Prevent going too far left
  if (player.x < cameraX - 20) player.x = cameraX - 20;
  
  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.12) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }
  
  if (player.hitTimer > 0) player.hitTimer -= dt;
  
  // Camera
  const targetCam = player.x - GAME_W * 0.35;
  cameraX += (targetCam - cameraX) * 0.1;
  if (cameraX < 0) cameraX = 0;
  
  // Collect packets
  packets.forEach(p => {
    if (p.collected) return;
    const dx = (player.x + player.w / 2) - p.x;
    const dy = (player.y + player.h / 2) - p.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      p.collected = true;
      score++;
      sfxCollect();
      spawnParticles(p.x, p.y, C.packet, 8, 4);
      spawnParticles(p.x, p.y, C.packetGlow, 4, 2);
    }
  });
  
  // Enemy updates & collision
  enemies.forEach(e => {
    if (!e.alive) return;
    
    if (e.type === 'packetloss') {
      e.phase += dt * 3;
      e.visible = Math.sin(e.phase) > -0.3;
    }
    
    if (e.type === 'latency') {
      e.x += e.dir * 0.5;
      if (e.x > e.baseX + e.patrolRange || e.x < e.baseX) e.dir *= -1;
    }
    
    if (e.type === 'server') {
      e.x += e.dir * 1;
      if (e.x > e.baseX + e.patrolRange || e.x < e.baseX) e.dir *= -1;
    }
    
    if (e.type === 'lagspike') {
      e.timer += dt;
      if (!e.active && e.timer > 2.5) {
        e.warningTimer += dt;
        if (e.warningTimer > 0.8) {
          e.active = true;
          e.activeTimer = 0;
        }
      }
      if (e.active) {
        e.activeTimer = (e.activeTimer || 0) + dt;
        if (e.activeTimer > 1) {
          e.active = false;
          e.timer = 0;
          e.warningTimer = 0;
        }
      }
    }
    
    // Player-enemy collision
    const enemyRect = getEnemyRect(e);
    if (enemyRect && rectCollide(player, enemyRect) && player.hitTimer <= 0) {
      // Check if stomping
      const playerBottom = player.y + player.h;
      const prevBottom = playerBottom - player.vy;
      
      if (e.type !== 'lagspike' && player.vy > 0 && prevBottom <= enemyRect.y + 8) {
        // Stomp!
        e.alive = false;
        player.vy = JUMP_FORCE * 0.6;
        sfxStomp();
        spawnParticles(e.x, e.y, C.glitch, 10, 5);
        score += 5;
      } else if (e.type === 'lagspike' && !e.active) {
        // Safe to walk over inactive spikes
      } else {
        // Hit by enemy
        if (e.type === 'latency') {
          player.lagTimer = 2;
          flashTimer = 0.5;
          spawnParticles(player.x + player.w/2, player.y + player.h/2, C.latency, 8, 3);
        }
        player.hitTimer = 1.5;
        player.vy = -6;
        player.vx = -player.facing * 4;
        screenShake = 0.4;
        sfxHit();
      }
    }
  });
  
  // Particles update
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);
  
  if (screenShake > 0) screenShake -= dt;
  if (flashTimer > 0) flashTimer -= dt;
  
  // Win condition
  if (player.x > finishX) {
    gameState = 'victory';
    stopMusic();
    sfxVictory();
  }
}

function getEnemyRect(e) {
  if (e.type === 'packetloss') {
    if (!e.visible) return null;
    return { x: e.x - 12, y: e.y - 12, w: 24, h: 24 };
  }
  if (e.type === 'latency') return { x: e.x - 14, y: e.y - 14, w: 28, h: 28 };
  if (e.type === 'server') return { x: e.x - 16, y: e.y - 32, w: 32, h: 48 };
  if (e.type === 'lagspike') {
    if (!e.active) return null;
    return { x: e.x - 8, y: e.y - 48, w: 16, h: 48 };
  }
  return null;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.imageSmoothingEnabled = false;
  
  if (gameState === 'menu') {
    renderMenu();
    return;
  }
  
  if (gameState === 'victory') {
    renderVictory();
    return;
  }
  
  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * 6;
    shakeY = (Math.random() - 0.5) * 6;
  }
  
  ctx.save();
  ctx.translate(shakeX, shakeY);
  
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  skyGrad.addColorStop(0, C.sky1);
  skyGrad.addColorStop(0.5, C.sky2);
  skyGrad.addColorStop(1, C.sky3);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  
  // Parallax clouds (slow)
  renderClouds(cameraX * 0.1);
  
  // Parallax mountains
  renderMountains(cameraX * 0.2);
  
  // Golden Gate Bridge (medium parallax)
  renderBridge(cameraX * 0.4);
  
  // Water
  renderWater(cameraX * 0.3);
  
  ctx.save();
  ctx.translate(-cameraX, 0);
  
  // Platforms
  platforms.forEach(p => renderPlatform(p));
  
  // Packets
  packets.forEach(p => {
    if (!p.collected) renderPacket(p);
  });
  
  // Enemies
  enemies.forEach(e => {
    if (e.alive) renderEnemy(e);
  });
  
  // Finish banner
  renderFinish();
  
  // Player
  renderPlayer();
  
  ctx.restore();
  
  // Particles (screen space)
  ctx.save();
  ctx.translate(-cameraX, 0);
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - p.size/2), Math.floor(p.y - p.size/2), p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
  
  // Lag flash effect
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(160, 64, 255, ${flashTimer * 0.3})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
  
  // Lag overlay
  if (player.lagTimer > 0) {
    ctx.fillStyle = `rgba(160, 64, 255, ${0.05 + Math.sin(Date.now() * 0.02) * 0.03})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    // Scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    for (let y = 0; y < GAME_H; y += 3) {
      ctx.fillRect(0, y, GAME_W, 1);
    }
  }
  
  ctx.restore();
  
  // Logo watermark in gameplay background
  if (logoLoaded) {
    ctx.globalAlpha = 0.12;
    const bgLogoW = 200;
    const bgLogoH = bgLogoW * (logoImg.naturalHeight / logoImg.naturalWidth);
    ctx.drawImage(logoImg, GAME_W - bgLogoW - 10, 10, bgLogoW, bgLogoH);
    ctx.globalAlpha = 1;
  }
  
  // HUD
  renderHUD();
}

function renderClouds(offset) {
  const cloudPositions = [
    { x: 100, y: 40, w: 80, h: 30 },
    { x: 350, y: 60, w: 60, h: 20 },
    { x: 600, y: 30, w: 100, h: 35 },
    { x: 900, y: 55, w: 70, h: 25 },
    { x: 1200, y: 45, w: 90, h: 30 },
  ];
  cloudPositions.forEach(c => {
    const cx = ((c.x - offset) % (GAME_W + 200)) - 100;
    ctx.fillStyle = C.cloud;
    // Pixel cloud shape
    ctx.fillRect(cx + c.w * 0.2, c.y, c.w * 0.6, c.h);
    ctx.fillRect(cx, c.y + c.h * 0.3, c.w, c.h * 0.5);
    ctx.fillStyle = C.cloudShadow;
    ctx.fillRect(cx + 4, c.y + c.h * 0.6, c.w - 4, c.h * 0.3);
  });
}

function renderMountains(offset) {
  const mtnColor = C.mountain;
  const mtnLight = C.mountainLight;
  
  for (let i = 0; i < 5; i++) {
    const bx = i * 250 - (offset % 250) - 50;
    const height = 80 + Math.sin(i * 1.7) * 40;
    const width = 200 + Math.sin(i * 2.3) * 60;
    
    ctx.fillStyle = mtnColor;
    ctx.beginPath();
    ctx.moveTo(bx, GAME_H - 60);
    ctx.lineTo(bx + width / 2, GAME_H - 60 - height);
    ctx.lineTo(bx + width, GAME_H - 60);
    ctx.fill();
    
    ctx.fillStyle = mtnLight;
    ctx.beginPath();
    ctx.moveTo(bx + width / 2, GAME_H - 60 - height);
    ctx.lineTo(bx + width * 0.6, GAME_H - 60 - height * 0.5);
    ctx.lineTo(bx + width / 2 + 10, GAME_H - 60 - height + 15);
    ctx.fill();
  }
}

function renderBridge(offset) {
  const bridgeY = GAME_H - 120;
  const towerWidth = 24;
  const towerHeight = 140;
  
  // Bridge deck
  ctx.fillStyle = C.bridge;
  ctx.fillRect(0, bridgeY, GAME_W, 12);
  ctx.fillStyle = C.bridgeDark;
  ctx.fillRect(0, bridgeY + 12, GAME_W, 4);
  
  // Towers
  for (let i = 0; i < 3; i++) {
    const tx = ((i * 350 - offset) % (GAME_W + 400)) - 50;
    
    // Tower body
    ctx.fillStyle = C.bridge;
    ctx.fillRect(tx, bridgeY - towerHeight, towerWidth, towerHeight);
    ctx.fillStyle = C.bridgeLight;
    ctx.fillRect(tx + 2, bridgeY - towerHeight, 4, towerHeight);
    
    // Tower top
    ctx.fillStyle = C.bridgeDark;
    ctx.fillRect(tx - 3, bridgeY - towerHeight - 6, towerWidth + 6, 8);
    ctx.fillRect(tx - 1, bridgeY - towerHeight - 10, towerWidth + 2, 6);
    
    // Cross beams
    for (let j = 0; j < 3; j++) {
      const by = bridgeY - towerHeight + 30 + j * 35;
      ctx.fillStyle = C.bridgeDark;
      ctx.fillRect(tx - 2, by, towerWidth + 4, 4);
    }
    
    // Cables
    ctx.strokeStyle = C.cable;
    ctx.lineWidth = 2;
    for (let side = -1; side <= 1; side += 2) {
      ctx.beginPath();
      ctx.moveTo(tx + towerWidth / 2, bridgeY - towerHeight);
      ctx.quadraticCurveTo(tx + towerWidth / 2 + side * 150, bridgeY - 20, tx + towerWidth / 2 + side * 300, bridgeY - towerHeight);
      ctx.stroke();
    }
    
    // Vertical cables
    for (let v = 1; v <= 5; v++) {
      for (let side = -1; side <= 1; side += 2) {
        const vx = tx + towerWidth / 2 + side * v * 50;
        const cableY = bridgeY - towerHeight + v * v * 3;
        ctx.fillStyle = C.cable;
        ctx.fillRect(vx, cableY, 1, bridgeY - cableY);
      }
    }
  }
}

function renderWater(offset) {
  ctx.fillStyle = C.water;
  ctx.fillRect(0, GAME_H - 60, GAME_W, 60);
  
  // Wave highlights
  const time = Date.now() * 0.002;
  ctx.fillStyle = C.waterLight;
  for (let x = 0; x < GAME_W; x += 20) {
    const wy = GAME_H - 55 + Math.sin((x - offset) * 0.05 + time) * 3;
    ctx.fillRect(x, wy, 12, 2);
  }
}

function renderPlatform(p) {
  if (p.type === 'ground') {
    // Top grass
    ctx.fillStyle = C.grassLight;
    ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.fillStyle = C.grass;
    ctx.fillRect(p.x, p.y + 4, p.w, 4);
    // Dirt
    ctx.fillStyle = C.dirt;
    ctx.fillRect(p.x, p.y + 8, p.w, p.h - 8);
    ctx.fillStyle = C.dirtDark;
    ctx.fillRect(p.x, p.y + p.h - 4, p.w, 4);
    // Dirt pattern
    for (let dx = p.x + 4; dx < p.x + p.w; dx += 12) {
      ctx.fillStyle = C.dirtDark;
      ctx.fillRect(dx, p.y + 14, 4, 4);
    }
    // Fill below
    ctx.fillStyle = C.dirtDark;
    ctx.fillRect(p.x, p.y + p.h, p.w, GAME_H - p.y);
  } else if (p.type === 'platform' || p.type === 'moving') {
    ctx.fillStyle = C.platformTop;
    ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.fillStyle = C.platform;
    ctx.fillRect(p.x, p.y + 4, p.w, p.h - 4);
    ctx.fillStyle = C.platformDark;
    ctx.fillRect(p.x + 2, p.y + p.h - 3, p.w - 4, 3);
    // Brick pattern
    ctx.fillStyle = C.platformDark;
    for (let bx = p.x + 2; bx < p.x + p.w - 2; bx += 10) {
      ctx.fillRect(bx, p.y + 6, 1, p.h - 9);
    }
  }
}

function renderPacket(p) {
  const time = Date.now() * 0.005;
  const bob = Math.sin(time + p.x * 0.1) * 3;
  const px = Math.floor(p.x);
  const py = Math.floor(p.y + bob);
  
  // Glow
  ctx.fillStyle = 'rgba(0, 232, 252, 0.15)';
  ctx.fillRect(px - 8, py - 8, 16, 16);
  
  // Packet shape (diamond/envelope)
  ctx.fillStyle = C.packet;
  ctx.fillRect(px - 4, py - 2, 8, 4);
  ctx.fillRect(px - 2, py - 4, 4, 8);
  ctx.fillStyle = C.packetGlow;
  ctx.fillRect(px - 2, py - 2, 4, 2);
  
  // Sparkle
  const sparkle = Math.sin(time * 3 + p.x) > 0.7;
  if (sparkle) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 4, py - 4, 2, 2);
  }
}

function renderEnemy(e) {
  const time = Date.now() * 0.003;
  
  if (e.type === 'packetloss') {
    if (!e.visible) return;
    const flicker = Math.random() > 0.3;
    if (!flicker) return;
    
    // Glitchy square
    ctx.fillStyle = C.glitch;
    ctx.fillRect(e.x - 10, e.y - 10, 20, 20);
    ctx.fillStyle = C.glitchAlt;
    ctx.fillRect(e.x - 6 + Math.random() * 4, e.y - 8, 12, 4);
    ctx.fillRect(e.x - 8, e.y + 2 + Math.random() * 2, 16, 3);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x - 6, e.y - 4, 4, 4);
    ctx.fillRect(e.x + 2, e.y - 4, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x - 4, e.y - 2, 2, 2);
    ctx.fillRect(e.x + 4, e.y - 2, 2, 2);
    // Glitch lines
    ctx.fillStyle = C.glitch;
    ctx.fillRect(e.x - 14 + Math.random() * 4, e.y + Math.random() * 10 - 5, 28, 2);
  }
  
  if (e.type === 'latency') {
    // Trail afterimages
    for (let i = 3; i >= 1; i--) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = C.latencyTrail;
      const ox = -e.dir * i * 8;
      ctx.fillRect(e.x - 12 + ox, e.y - 12, 24, 24);
      ctx.beginPath();
      ctx.arc(e.x + ox, e.y - 14, 12, Math.PI, 0);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Blob body
    ctx.fillStyle = C.latency;
    ctx.fillRect(e.x - 12, e.y - 12, 24, 24);
    // Rounded top
    ctx.fillRect(e.x - 10, e.y - 16, 20, 6);
    ctx.fillRect(e.x - 6, e.y - 18, 12, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x - 6, e.y - 8, 5, 5);
    ctx.fillRect(e.x + 2, e.y - 8, 5, 5);
    ctx.fillStyle = '#200040';
    ctx.fillRect(e.x - 4, e.y - 6, 3, 3);
    ctx.fillRect(e.x + 4, e.y - 6, 3, 3);
    // Drip
    const dripLen = 4 + Math.sin(time) * 2;
    ctx.fillStyle = C.latencyTrail;
    ctx.fillRect(e.x - 8, e.y + 12, 4, dripLen);
    ctx.fillRect(e.x + 4, e.y + 12, 4, dripLen + 2);
  }
  
  if (e.type === 'server') {
    const bx = e.x - 14;
    const by = e.y - 32;
    // Server rack body
    ctx.fillStyle = C.server;
    ctx.fillRect(bx, by, 28, 48);
    ctx.fillStyle = '#404850';
    ctx.fillRect(bx + 2, by + 2, 24, 44);
    // Drive bays
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = '#383e48';
      ctx.fillRect(bx + 4, by + 4 + i * 10, 20, 8);
      // Blinking lights
      const lightOn = Math.sin(time * 2 + i * 1.5) > 0;
      ctx.fillStyle = lightOn ? C.serverLight : '#204030';
      ctx.fillRect(bx + 6, by + 6 + i * 10, 3, 3);
      ctx.fillStyle = Math.sin(time * 3 + i) > 0.5 ? C.serverBlink : '#402020';
      ctx.fillRect(bx + 11, by + 6 + i * 10, 3, 3);
    }
    // Face
    ctx.fillStyle = '#fff';
    ctx.fillRect(bx + 8, by + 14, 4, 4);
    ctx.fillRect(bx + 16, by + 14, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(bx + 9, by + 15, 2, 2);
    ctx.fillRect(bx + 17, by + 15, 2, 2);
    // Legs
    ctx.fillStyle = C.server;
    ctx.fillRect(bx + 4, by + 46, 6, 6);
    ctx.fillRect(bx + 18, by + 46, 6, 6);
  }
  
  if (e.type === 'lagspike') {
    if (e.warningTimer > 0 && !e.active) {
      // Warning indicator
      const blink = Math.sin(Date.now() * 0.02) > 0;
      if (blink) {
        ctx.fillStyle = C.spike;
        ctx.fillRect(e.x - 2, e.y - 4, 4, 4);
        ctx.fillStyle = '#fff';
        ctx.font = '8px monospace';
        ctx.fillText('!', e.x - 2, e.y - 6);
      }
    }
    if (e.active) {
      // Energy spike
      const h = 48;
      ctx.fillStyle = C.spike;
      ctx.fillRect(e.x - 3, e.y - h, 6, h);
      ctx.fillStyle = C.spikeGlow;
      ctx.fillRect(e.x - 1, e.y - h, 2, h);
      // Sparks
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 6, e.y - h + Math.random() * h, 3, 2);
      ctx.fillRect(e.x + 4, e.y - h * 0.5 + Math.random() * h * 0.5, 3, 2);
      // Base glow
      ctx.fillStyle = 'rgba(255, 224, 32, 0.3)';
      ctx.fillRect(e.x - 10, e.y - 8, 20, 8);
    }
  }
}

function renderFinish() {
  const bx = finishX;
  const by = GAME_H - TILE * 3 - 60;
  
  // Banner pole
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(bx, by, 4, 80);
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(bx, by, 2, 80);
  
  // Banner
  const time = Date.now() * 0.003;
  ctx.fillStyle = '#00c853';
  ctx.fillRect(bx + 4, by, 50, 24);
  ctx.fillStyle = '#00e676';
  ctx.fillRect(bx + 4, by, 50, 4);
  
  // Checkered pattern
  for (let cx = 0; cx < 5; cx++) {
    for (let cy = 0; cy < 2; cy++) {
      if ((cx + cy) % 2 === 0) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx + 6 + cx * 9, by + 5 + cy * 8, 8, 7);
      }
    }
  }
  
  // Sparkles near finish
  if (Math.sin(time * 5) > 0.5) {
    ctx.fillStyle = '#ffe';
    ctx.fillRect(bx + 20 + Math.sin(time * 2) * 10, by - 10, 3, 3);
    ctx.fillRect(bx + 40 + Math.cos(time * 3) * 8, by + 5, 2, 2);
  }
}

function renderPlayer() {
  if (player.hitTimer > 0 && Math.sin(player.hitTimer * 20) > 0) return; // Flash
  
  let sprite;
  if (!player.grounded) {
    sprite = playerJump;
  } else if (Math.abs(player.vx) > 0.5) {
    sprite = player.animFrame < 2 ? playerRun1 : playerRun2;
  } else {
    sprite = playerIdle1;
  }
  
  const px = Math.floor(player.x);
  const py = Math.floor(player.y);
  const pxSize = 2;
  
  // Draw sprite (flip if facing left)
  if (player.facing >= 0) {
    drawPixelArt(sprite, px - 2, py, pxSize);
  } else {
    // Flip
    ctx.save();
    ctx.translate(px + player.w / 2, 0);
    ctx.scale(-1, 1);
    drawPixelArt(sprite, -player.w / 2 - 2, py, pxSize);
    ctx.restore();
  }
}

function renderHUD() {
  // Packet counter
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(8, 8, 120, 28);
  ctx.fillStyle = C.packet;
  ctx.fillRect(14, 14, 8, 8);
  ctx.fillRect(16, 12, 4, 12);
  ctx.fillStyle = '#fff';
  ctx.font = '12px "Press Start 2P", monospace';
  ctx.fillText(`× ${score}`, 28, 24);
  
  // Timer
  const remaining = Math.max(0, GAME_DURATION - gameTime);
  const timerColor = remaining < 15 ? '#ff4444' : '#fff';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(GAME_W - 100, 8, 92, 28);
  ctx.fillStyle = timerColor;
  ctx.fillText(remaining.toFixed(1) + 's', GAME_W - 92, 24);
  
  // Lag indicator
  if (player.lagTimer > 0) {
    ctx.fillStyle = 'rgba(160, 64, 255, 0.8)';
    ctx.fillRect(GAME_W / 2 - 50, 10, 100, 20);
    ctx.fillStyle = '#fff';
    ctx.font = '8px "Press Start 2P", monospace';
    ctx.fillText('HIGH LATENCY!', GAME_W / 2 - 44, 23);
  }
  
  // Mobile touch controls hint
  if ('ontouchstart' in window) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(10, GAME_H - 60, 80, 50);
    ctx.fillRect(GAME_W - 90, GAME_H - 60, 80, 50);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillText('← →', 20, GAME_H - 30);
    ctx.fillText('JUMP', GAME_W - 78, GAME_H - 30);
  }
}

function renderMenu() {
  // Animated background
  const time = Date.now() * 0.001;
  
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  skyGrad.addColorStop(0, '#0a1530');
  skyGrad.addColorStop(1, '#1a3060');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  
  // Stars
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5 + time * 10) % GAME_W;
    const sy = (i * 97.3) % (GAME_H * 0.6);
    const bright = Math.sin(time * 2 + i) > 0.3;
    ctx.fillStyle = bright ? '#fff' : '#556';
    ctx.fillRect(sx, sy, 2, 2);
  }
  
  // Bridge silhouette
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(0, GAME_H - 100, GAME_W, 100);
  // Tower silhouettes
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(100 + i * 280, GAME_H - 220, 20, 160);
    ctx.fillRect(96 + i * 280, GAME_H - 226, 28, 8);
  }
  // Cables
  ctx.strokeStyle = '#151530';
  ctx.lineWidth = 2;
  for (let i = 0; i < 2; i++) {
    ctx.beginPath();
    ctx.moveTo(110 + i * 280, GAME_H - 220);
    ctx.quadraticCurveTo(110 + i * 280 + 140, GAME_H - 100, 110 + (i + 1) * 280, GAME_H - 220);
    ctx.stroke();
  }
  
  // Floating packets on menu
  for (let i = 0; i < 8; i++) {
    const px = 100 + i * 90;
    const py = 200 + Math.sin(time * 1.5 + i * 0.8) * 30;
    ctx.fillStyle = `rgba(0, 232, 252, ${0.15 + Math.sin(time + i) * 0.1})`;
    ctx.fillRect(px - 4, py - 2, 8, 4);
    ctx.fillRect(px - 2, py - 4, 4, 8);
  }
  
  // Logo watermark top-right
  if (logoLoaded) {
    const logoW = 200;
    const logoH = logoW * (logoImg.naturalHeight / logoImg.naturalWidth);
    ctx.globalAlpha = 0.12;
    ctx.drawImage(logoImg, GAME_W - logoW - 10, 10, logoW, logoH);
    ctx.globalAlpha = 1;
  }
  
  // Title
  ctx.fillStyle = C.packet;
  ctx.font = '32px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00e8fc';
  ctx.shadowBlur = 20;
  ctx.fillText('PACKET RUN', GAME_W / 2, 100);
  ctx.shadowBlur = 0;
  
  // Subtitle
  ctx.fillStyle = '#8899aa';
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillText('A Networking Adventure', GAME_W / 2, 130);
  
  // Character preview
  const charX = GAME_W / 2 - 16;
  const charY = 170;
  const bobY = Math.sin(time * 2) * 4;
  drawPixelArt(playerIdle1, charX, charY + bobY, 2);
  
  // Press start
  const blink = Math.sin(menuBlink * 4) > 0;
  if (blink) {
    ctx.fillStyle = '#fff';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.fillText('PRESS SPACE TO START', GAME_W / 2, 310);
  }
  
  // Controls
  ctx.fillStyle = '#556677';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillText('ARROWS/WASD: MOVE    SPACE: JUMP', GAME_W / 2, 360);
  ctx.fillText('DOUBLE JUMP ENABLED!', GAME_W / 2, 380);
  
  ctx.textAlign = 'left';
}

function renderVictory() {
  const time = Date.now() * 0.001;
  
  // Background
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  skyGrad.addColorStop(0, '#0a2040');
  skyGrad.addColorStop(1, '#103060');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  
  // Confetti particles
  for (let i = 0; i < 40; i++) {
    const cx = (i * 23.7 + time * 40) % GAME_W;
    const cy = (i * 47.3 + time * 60 + Math.sin(time + i) * 20) % GAME_H;
    const colors = ['#ff4466', '#44ff88', '#4488ff', '#ffcc44', '#ff88ff', C.packet];
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(cx, cy, 4, 4);
  }
  
  // Logo watermark top-right
  if (logoLoaded) {
    const vLogoW = 200;
    const vLogoH = vLogoW * (logoImg.naturalHeight / logoImg.naturalWidth);
    ctx.globalAlpha = 0.12;
    ctx.drawImage(logoImg, GAME_W - vLogoW - 10, 10, vLogoW, vLogoH);
    ctx.globalAlpha = 1;
  }
  
  // Victory character
  const charX = GAME_W / 2 - 16;
  const charY = 60;
  const bobY = Math.sin(time * 3) * 3;
  drawPixelArt(playerVictory, charX, charY + bobY, 2);
  
  // Victory text
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe044';
  ctx.font = '20px "Press Start 2P", monospace';
  ctx.shadowColor = '#ffe044';
  ctx.shadowBlur = 15;
  ctx.fillText('LEVEL COMPLETE!', GAME_W / 2, 170);
  ctx.shadowBlur = 0;
  
  // Score
  ctx.fillStyle = C.packet;
  ctx.font = '12px "Press Start 2P", monospace';
  ctx.fillText(`PACKETS: ${score}`, GAME_W / 2, 200);
  
  // CTA Message box
  ctx.fillStyle = 'rgba(0,20,50,0.85)';
  ctx.strokeStyle = C.packet;
  ctx.lineWidth = 2;
  const boxX = GAME_W / 2 - 300;
  const boxY = 225;
  const boxW = 600;
  const boxH = 100;
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  
  // Pixel border decoration
  ctx.fillStyle = C.packet;
  for (let i = 0; i < boxW; i += 8) {
    ctx.fillRect(boxX + i, boxY - 2, 4, 2);
    ctx.fillRect(boxX + i, boxY + boxH, 4, 2);
  }
  
  // CTA text
  ctx.fillStyle = '#fff';
  ctx.font = '11px "Press Start 2P", monospace';
  ctx.fillText('Meet Tom at GDC to talk', GAME_W / 2, boxY + 35);
  ctx.fillText('about all things', GAME_W / 2, boxY + 55);
  ctx.fillStyle = C.packetGlow;
  ctx.fillText('Multiplayer Game Hosting', GAME_W / 2, boxY + 75);
  
  // Restart prompt
  const blink = Math.sin(menuBlink * 4) > 0;
  if (blink) {
    ctx.fillStyle = '#8899aa';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillText('PRESS SPACE TO RESTART', GAME_W / 2, 370);
  }
  
  ctx.textAlign = 'left';
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  
  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
